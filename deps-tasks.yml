version: "3"
vars:
  # Target checksum files
  G_DEPS_CORE_CHECKSUM_FILE: "{{.G_CORE_DEPS_DIR}}/all.md5"
  G_DEPS_LOG_VIEWER_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#log-viewer.md5"

tasks:
  default:
    cmds:
      - task: "core"
      - task: "log-viewer"

  core:
    cmds:
      - "rm -rf '{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}'"
      - "mkdir -p '{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}'"
      - task: "core-all-parallel"
      - task: "combine-cmake-settings-files"
      - task: "combine-core-checksum-files"

  log-viewer:
    cmds:
      - task: ":utils:remote:download-and-extract-tar"
        vars:
          CHECKSUM_FILE: "{{.G_DEPS_LOG_VIEWER_CHECKSUM_FILE}}"
          FILE_SHA256: "de0600b505545f1bceb7ff5725941035f7c1dc875d08249d9b6d679e3ba77f26"
          OUTPUT_DIR: "{{.G_LOG_VIEWER_WEBUI_SRC_DIR}}/yscope-log-viewer"
          URL: "https://github.com/y-scope/yscope-log-viewer/archive/969ff35.tar.gz"
          TAR_FILE: "{{.G_BUILD_DIR}}/yscope-log-viewer.tar.gz"

  core-all-parallel:
    internal: true
    run: "once"
    deps:
      - task: "absl"
      - task: "antlr4"
      - task: "catch2"
      - task: "date"
      - task: "fmt"
      - task: "json"
      - task: "log-surgeon"
      - task: "outcome"
      - task: "quickcpplib"
      - task: "simdjson"
      - task: "spdlog"
      - task: "sqlite3"
      - task: "utfcpp"
      - task: "yaml-cpp"
      - task: "ystdlib"

  absl:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
            - "-DCMAKE_CXX_STANDARD=20"
          LIB_NAME: "absl"
          TARBALL_SHA256: "987ce98f02eefbaf930d6e38ab16aa05737234d7afbab2d5c4ea7adbe50c28ed"
          TARBALL_URL: "https://github.com/abseil/abseil-cpp/archive/refs/tags/20230802.1.tar.gz"

  # Adds a <PACKAGE>_ROOT variable for a library to a library-specific CMake settings file.
  #
  # @param {string} LIB_NAME
  # @param {string} LIB_INSTALL_PREFIX
  add-package-root-to-cmake-settings:
    internal: true
    label: "{{.TASK}}-{{.LIB_NAME}}-{{.LIB_INSTALL_PREFIX}}"
    requires:
      vars:
        - "LIB_NAME"
        - "LIB_INSTALL_PREFIX"
    vars:
      OUTPUT_FILE: "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/{{.LIB_NAME}}.cmake"
    sources:
      - "{{.TASKFILE}}"
    generates:
      - "{{.OUTPUT_FILE}}"
    cmds:
      - >-
        echo "set(
          {{.LIB_NAME}}_ROOT
          \"{{.LIB_INSTALL_PREFIX}}\"
          CACHE PATH
          \"Install prefix for {{.LIB_NAME}}\"
        )" >> "{{.OUTPUT_FILE}}"

  antlr4:
    internal: true
    vars:
      OUTPUT_FILE: "{{.G_CORE_DEPS_DIR}}/antlr-4.13.1-complete.jar"
    run: "once"
    cmds:
      - task: ":utils:remote:curl"
        vars:
          FILE_SHA256: "bc13a9c57a8dd7d5196888211e5ede657cb64a3ce968608697e4f668251a8487"
          OUTPUT_FILE: "{{.OUTPUT_FILE}}"
          URL: "https://www.antlr.org/download/antlr-4.13.1-complete.jar"
      - >-
        echo "set(
        ANTLR_EXECUTABLE \"{{.OUTPUT_FILE}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/ANTLR4.cmake"

  catch2:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DBUILD_TESTING=OFF"
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "Catch2"
          TARBALL_SHA256: "3cdb4138a072e4c0290034fe22d9f0a80d3bcfb8d7a8a5c49ad75d3a5da24fae"
          TARBALL_URL: "https://github.com/catchorg/Catch2/archive/refs/tags/v2.13.7.tar.gz"

  # Combines all CMake settings files into {{.G_CORE_DEPS_CMAKE_SETTINGS_FILE}}.
  combine-cmake-settings-files:
    internal: true
    cmd: |-
      for file in "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}"/*.cmake; do
        if [[ "$file" != "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}" ]]; then
          echo "include(\"$file\")" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_FILE}}"
        fi
      done

  # Combines all checksum files for core's dependencies.
  combine-core-checksum-files:
    internal: true
    cmds:
      - rm -f "{{.G_DEPS_CORE_CHECKSUM_FILE}}"
      - |-
        for file in "{{.G_CORE_DEPS_DIR}}"/*-install.md5; do
          cat "$file" >> "{{.G_DEPS_CORE_CHECKSUM_FILE}}"
        done

  date:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "date"
          TARBALL_SHA256: "7a390f200f0ccd207e8cff6757e04817c1a0aec3e327b006b7eb451c57ee3538"
          TARBALL_URL: "https://github.com/HowardHinnant/date/archive/refs/tags/v3.0.1.tar.gz"

  fmt:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
            - "-DFMT_TEST=OFF"
          LIB_NAME: "fmt"
          TARBALL_SHA256: "b06ca3130158c625848f3fb7418f235155a4d389b2abc3a6245fb01cb0eb1e01"
          TARBALL_URL: "https://github.com/fmtlib/fmt/archive/refs/tags/8.0.1.tar.gz"

  # Installs a CMake-based library from a remote tarball, generates a settings file for it, and
  # computes a checksum for the installation directory.
  #
  # @param {string} LIB_NAME
  # @param {string} TARBALL_SHA256
  # @param {string} TARBALL_URL
  # @param {string[]} [CMAKE_GEN_ARGS] Any additional arguments to pass to the CMake generate
  # command.
  install-remote-cmake-lib:
    internal: true
    vars:
      CMAKE_GEN_ARGS:
        ref: "default (list) .CMAKE_GEN_ARGS"
      INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"
      INSTALL_DIR_CHECKSUM_FILE: "{{.INSTALL_PREFIX}}.md5"
    generates:
      - "{{.INSTALL_DIR_CHECKSUM_FILE}}"
    deps:
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.INSTALL_DIR_CHECKSUM_FILE}}"
          INCLUDE_PATTERNS:
            - "{{.INSTALL_PREFIX}}"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          FILE_SHA256: "{{.TARBALL_SHA256}}"
          GEN_ARGS:
            ref: ".CMAKE_GEN_ARGS"
          NAME: "{{.LIB_NAME}}"
          URL: "{{.TARBALL_URL}}"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.INSTALL_PREFIX}}"
      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.INSTALL_DIR_CHECKSUM_FILE}}"
          INCLUDE_PATTERNS:
            - "{{.INSTALL_PREFIX}}"

  json:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
            - "-DJSON_BuildTests=OFF"
          LIB_NAME: "nlohmann_json"
          TARBALL_SHA256: "d6c65aca6b1ed68e7a182f4757257b107ae403032760ed6ef121c9d55e81757d"
          TARBALL_URL: "https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz"

  log-surgeon:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "log_surgeon"
          TARBALL_SHA256: "169b56714b620c3f8f07bf7975aba8573b9bd25e423e5c4f0cc9b52450a2403d"
          TARBALL_URL: "https://github.com/y-scope/log-surgeon/archive/f801a3f.tar.gz"

  outcome:
    internal: true
    deps:
      - "quickcpplib"
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-C {{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/quickcpplib.cmake"
            - "-DBUILD_TESTING=OFF"
            - "-DCMAKE_BUILD_TYPE=Release"
            - "-DCMAKE_POLICY_DEFAULT_CMP0074=NEW"
          LIB_NAME: "outcome"
          TARBALL_SHA256: "9588c01465b287296ab647b2caf50d5137e3eeaf662e3105b858d5c5c7579428"
          TARBALL_URL: "https://github.com/ned14/outcome/releases/download/v2.2.9\
          /outcome-v2-all-sources-571f9c930e672950e99d5d30f743603aaaf8014c.tar.xz"

  quickcpplib:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DBUILD_TESTING=OFF"
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "quickcpplib"
          TARBALL_SHA256: "bb9da86efa2f262e6a292453775fa9b999b422700eb1c1ac390b7cbe5f0ec92f"

          # NOTE: quickcpplib doesn't have official releases but if quickcpplib isn't installed,
          # `outcome` will use the latest commit available. So we assume the `outcome` release we
          # chose above would've been tested with the latest commit of `quickcpplib` that was
          # available at the time of the release, and that's the commit we use here.
          TARBALL_URL: "https://github.com/ned14/quickcpplib/archive/72277c7.tar.gz"

  simdjson:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "simdjson"
          TARBALL_SHA256: "afd8201cfb1abe927737d876441bb1f21730a9ee6078a1b8c6174e6463981fa3"
          TARBALL_URL: "https://github.com/simdjson/simdjson/archive/refs/tags/v3.6.3.tar.gz"

  spdlog:
    internal: true
    deps:
      - "fmt"
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-C {{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/fmt.cmake"
            - "-DCMAKE_BUILD_TYPE=Release"
            - "-DCMAKE_POLICY_DEFAULT_CMP0074=NEW"
            - "-DSPDLOG_BUILD_EXAMPLE=OFF"
            - "-DSPDLOG_BUILD_EXAMPLE_HO=OFF"
            - "-DSPDLOG_FMT_EXTERNAL=ON"
          LIB_NAME: "spdlog"
          TARBALL_SHA256: "6fff9215f5cb81760be4cc16d033526d1080427d236e86d70bb02994f85e3d38"

          # NOTE: Since spdlog depends on fmt, we need to keep their versions compatible with each
          # other.
          TARBALL_URL: "https://github.com/gabime/spdlog/archive/refs/tags/v1.9.2.tar.gz"

  sqlite3:
    internal: true
    vars:
      EXTRACTION_DIR: "{{.G_CORE_DEPS_DIR}}/SQLITE3-src"
      ZIP_FILENAME_STEM: "sqlite-amalgamation-3360000"
      SRC_DIR: "{{.EXTRACTION_DIR}}/{{.ZIP_FILENAME_STEM}}"
    run: "once"
    cmds:
      - task: ":utils:remote:download-and-extract-zip"
        vars:
          CHECKSUM_FILE: "{{.G_CORE_DEPS_DIR}}/sqlite3.md5"
          FILE_SHA256: "999826fe4c871f18919fdb8ed7ec9dd8217180854dd1fe21eea96aed36186729"
          OUTPUT_DIR: "{{.EXTRACTION_DIR}}"
          URL: "https://www.sqlite.org/2021/{{.ZIP_FILENAME_STEM}}.zip"
      - >-
        echo "set(
        CLP_SQLITE_SOURCE_DIRECTORY \"{{.SRC_DIR}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/SQLITE3.cmake"

  utfcpp:
    internal: true
    vars:
      LIB_NAME: "utfcpp"
      UTFCPP_OUTPUT_DIR: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-src"
    run: "once"
    cmds:
      - task: ":utils:remote:download-and-extract-tar"
        vars:
          CHECKSUM_FILE: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}.md5"
          FILE_SHA256: "6920a6a5d6a04b9a89b2a89af7132f8acefd46e0c2a7b190350539e9213816c0"
          OUTPUT_DIR: "{{.UTFCPP_OUTPUT_DIR}}"
          URL: "https://github.com/nemtrif/utfcpp/archive/refs/tags/v4.0.6.tar.gz"
      - >-
        echo "set(
        CLP_UTFCPP_SOURCE_DIRECTORY \"{{.UTFCPP_OUTPUT_DIR}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/{{.LIB_NAME}}.cmake"

  yaml-cpp:
    internal: true
    run: "once"
    cmds:
      - task: "install-remote-cmake-lib"
        vars:
          CMAKE_GEN_ARGS:
            - "-DBUILD_TESTING=OFF"
            - "-DCMAKE_BUILD_TYPE=Release"
          LIB_NAME: "yaml-cpp"
          TARBALL_SHA256: "43e6a9fcb146ad871515f0d0873947e5d497a1c9c60c58cb102a97b47208b7c3"
          TARBALL_URL: "https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.7.0.tar.gz"

  ystdlib:
    internal: true
    vars:
      LIB_NAME: "ystdlib"
      YSTDLIB_OUTPUT_DIR: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-src"
    run: "once"
    cmds:
      - task: ":utils:remote:download-and-extract-tar"
        vars:
          CHECKSUM_FILE: "{{.G_CORE_DEPS_DIR}}/ystdlib.md5"
          FILE_SHA256: "367e0ccc8f46fcba93a8e7b508296686715c0875f9f882ca64013fe90b6a282f"
          OUTPUT_DIR: "{{.YSTDLIB_OUTPUT_DIR}}"
          URL: "https://github.com/y-scope/ystdlib-cpp/archive/d1b4ae0.tar.gz"
      - >-
        echo "set(
        CLP_YSTDLIB_SOURCE_DIRECTORY \"{{.YSTDLIB_OUTPUT_DIR}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/{{.LIB_NAME}}.cmake"
