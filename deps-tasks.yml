version: "3"
vars:
  # Utility script path
  G_DEP_DOWNLOAD_SCRIPT: "{{.ROOT_DIR}}/tools/scripts/deps-download/download-dep.py"

  # Target checksum files
  G_DEPS_CORE_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#core.md5"
  G_DEPS_LOG_VIEWER_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#log-viewer.md5"

  # Submodule checksum files
  G_OUTCOME_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#outcome.md5"
  G_UTFCPP_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#utfcpp.md5"
  G_YAML_CPP_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#yaml-cpp.md5"
  G_YSCOPE_LOG_VIEWER_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#yscope-log-viewer.md5"
  G_YSTDLIB_CPP_CHECKSUM_FILE: "{{.G_BUILD_DIR}}/deps#ystdlib-cpp.md5"

tasks:
  default:
    cmds:
      - task: "core"
      - task: "log-viewer"

  core:
    vars:
    sources:
      - "{{.G_OUTCOME_CHECKSUM_FILE}}"
      - "{{.G_UTFCPP_CHECKSUM_FILE}}"
      - "{{.G_YAML_CPP_CHECKSUM_FILE}}"
      - "{{.G_YSTDLIB_CPP_CHECKSUM_FILE}}"
    generates: ["{{.G_DEPS_CORE_CHECKSUM_FILE}}"]
    deps: ["all-internal-deps"]
    cmds:
      - >-
        cat
        "{{.G_OUTCOME_CHECKSUM_FILE}}"
        "{{.G_UTFCPP_CHECKSUM_FILE}}"
        "{{.G_YAML_CPP_CHECKSUM_FILE}}"
        "{{.G_YSTDLIB_CPP_CHECKSUM_FILE}}"
        >> "{{.G_DEPS_CORE_CHECKSUM_FILE}}"

  log-viewer:
    cmds:
      - task: ":utils:remote:download-and-extract-tar"
        vars:
          CHECKSUM_FILE: "{{.G_YSCOPE_LOG_VIEWER_CHECKSUM_FILE}}"
          FILE_SHA256: "de0600b505545f1bceb7ff5725941035f7c1dc875d08249d9b6d679e3ba77f26"
          OUTPUT_DIR: "{{.G_LOG_VIEWER_WEBUI_SRC_DIR}}/yscope-log-viewer"
          URL: "https://github.com/y-scope/yscope-log-viewer/archive/969ff35.tar.gz"
          TAR_FILE: "{{.G_BUILD_DIR}}/yscope-log-viewer.tar.gz"

  # NOTE: `git submodule update` doesn't support parallel invocations, so we can't use it to
  # download submodules in parallel. This means:
  # 1. the submodule tasks cannot be specified as a list of `deps`, because `task` always runs
  #   `deps` tasks in parallel.
  # 2. we need to force higher level tasks, like `core` and `log-viewer`, to run their submodule
  #    download tasks serially.
  #
  # As a solution, the `all-internal-deps` task below:
  # 1. uses `cmds` to sequentially download `ALL` submodules required by the clp-package.
  # 2. uses `run: once`, so it executes once even if multiple higher level targets depend on it.
  #
  # All higher level tasks must depend on this task instead of depending on the individual
  # submodule tasks in this file.
  all-internal-deps:
    internal: true
    run: "once"
    cmds:
      - "rm -rf '{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}'"
      - "mkdir -p '{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}'"
      - task: "absl"
      - task: "antlr4"
      - task: "catch2"
      - task: "date"
      - task: "json"
      - task: "log-surgeon"
      - task: "outcome"
      - task: "simdjson"
      - task: "sqlite3"
      - task: "utfcpp"
      - task: "yaml-cpp"
      - task: "ystdlib-cpp"
      - task: "combine-cmake-settings-files"

  absl:
    internal: true
    vars:
      LIB_NAME: "absl"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          FILE_SHA256: "987ce98f02eefbaf930d6e38ab16aa05737234d7afbab2d5c4ea7adbe50c28ed"
          GEN_ARGS:
            - "-DCMAKE_CXX_STANDARD=20"
          URL: "https://github.com/abseil/abseil-cpp/archive/refs/tags/20230802.1.tar.gz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  # Adds a <PACKAGE>_ROOT variable for a library to a library-specific CMake settings file.
  #
  # @param {string} LIB_NAME
  # @param {string} LIB_INSTALL_PREFIX
  add-package-root-to-cmake-settings:
    internal: true
    label: "{{.TASK}}-{{.LIB_NAME}}-{{.LIB_INSTALL_PREFIX}}"
    requires:
      vars:
        - "LIB_NAME"
        - "LIB_INSTALL_PREFIX"
    vars:
      OUTPUT_FILE: "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/{{.LIB_NAME}}.cmake"
    sources:
      - "{{.TASKFILE}}"
    generates:
      - "{{.OUTPUT_FILE}}"
    cmds:
      - >-
        echo "set(
          {{.LIB_NAME}}_ROOT
          \"{{.LIB_INSTALL_PREFIX}}\"
          CACHE PATH
          \"Install prefix for {{.LIB_NAME}}\"
        )" >> "{{.OUTPUT_FILE}}"

  antlr4:
    internal: true
    vars:
      OUTPUT_FILE: "{{.G_CORE_DEPS_DIR}}/antlr-4.13.1-complete.jar"
    cmds:
      - task: ":utils:remote:curl"
        vars:
          URL: "https://www.antlr.org/download/antlr-4.13.1-complete.jar"
          FILE_SHA256: "bc13a9c57a8dd7d5196888211e5ede657cb64a3ce968608697e4f668251a8487"
          OUTPUT_FILE: "{{.OUTPUT_FILE}}"
      - >-
        echo "set(
        ANTLR_EXECUTABLE \"{{.OUTPUT_FILE}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/ANTLR4.cmake"

  catch2:
    internal: true
    vars:
      LIB_NAME: "Catch2"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          GEN_ARGS: ["-DBUILD_TESTING=OFF"]
          FILE_SHA256: "3cdb4138a072e4c0290034fe22d9f0a80d3bcfb8d7a8a5c49ad75d3a5da24fae"
          URL: "https://github.com/catchorg/Catch2/archive/refs/tags/v2.13.7.tar.gz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  # Combines all CMake settings files into {{.G_CORE_DEPS_CMAKE_SETTINGS_FILE}}.
  combine-cmake-settings-files:
    internal: true
    cmd: |-
      for file in "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}"/*.cmake; do
        if [[ "$file" != "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}" ]]; then
          echo "include(\"$file\")" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_FILE}}"
        fi
      done

  date:
    internal: true
    vars:
      LIB_NAME: "date"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          FILE_SHA256: "7a390f200f0ccd207e8cff6757e04817c1a0aec3e327b006b7eb451c57ee3538"
          URL: "https://github.com/HowardHinnant/date/archive/refs/tags/v3.0.1.tar.gz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  json:
    internal: true
    vars:
      LIB_NAME: "nlohmann_json"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          FILE_SHA256: "d6c65aca6b1ed68e7a182f4757257b107ae403032760ed6ef121c9d55e81757d"
          GEN_ARGS: ["-DJSON_BuildTests=OFF"]
          URL: "https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  log-surgeon:
    internal: true
    vars:
      LIB_NAME: "log_surgeon"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          FILE_SHA256: "169b56714b620c3f8f07bf7975aba8573b9bd25e423e5c4f0cc9b52450a2403d"
          URL: "https://github.com/y-scope/log-surgeon/archive/f801a3f.tar.gz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  outcome:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_OUTCOME_CHECKSUM_FILE}}"
      DEST: "{{.G_CORE_COMPONENT_SUBMODULES_DIR}}/outcome"
    sources:
      - "{{.G_DEP_DOWNLOAD_SCRIPT}}"
      - "{{.G_UTILS_TASKFILE}}"
      - "{{.ROOT_DIR}}/Taskfile.yml"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    deps:
      - ":init"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]
    cmds:
      - task: "download-dependency"
        vars:
          DEST: "{{.DEST}}"
          FLAGS: "--extract"
          SRC_NAME: "outcome-2.2.9"
          SRC_URL: "https://github.com/ned14/outcome/archive/refs/tags/v2.2.9.zip"
      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]

  simdjson:
    internal: true
    vars:
      LIB_NAME: "simdjson"
    cmds:
      - task: ":utils:cmake:install-remote-tar"
        vars:
          NAME: "{{.LIB_NAME}}"
          FILE_SHA256: "afd8201cfb1abe927737d876441bb1f21730a9ee6078a1b8c6174e6463981fa3"
          URL: "https://github.com/simdjson/simdjson/archive/refs/tags/v3.6.3.tar.gz"
          WORK_DIR: "{{.G_CORE_DEPS_DIR}}"
      - task: "add-package-root-to-cmake-settings"
        vars:
          LIB_NAME: "{{.LIB_NAME}}"
          LIB_INSTALL_PREFIX: "{{.G_CORE_DEPS_DIR}}/{{.LIB_NAME}}-install"

  sqlite3:
    internal: true
    vars:
      G_CORE_SQLITE3_OUTPUT_DIR: "{{.G_CORE_DEPS_DIR}}/SQLITE3-src"
      G_CORE_SQLITE3_ZIP_FILENAME_STEM: "sqlite-amalgamation-3360000"
      G_CORE_SQLITE3_SRC_DIR: "{{.G_CORE_SQLITE3_OUTPUT_DIR}}/{{.G_CORE_SQLITE3_ZIP_FILENAME_STEM}}"
    cmds:
      - task: ":utils:remote:download-and-extract-zip"
        vars:
          CHECKSUM_FILE: "{{.G_CORE_DEPS_DIR}}/sqlite3.md5"
          FILE_SHA256: "999826fe4c871f18919fdb8ed7ec9dd8217180854dd1fe21eea96aed36186729"
          OUTPUT_DIR: "{{.G_CORE_SQLITE3_OUTPUT_DIR}}"
          URL: "https://www.sqlite.org/2021/{{.G_CORE_SQLITE3_ZIP_FILENAME_STEM}}.zip"
      - >-
        echo "set(
        CLP_SQLITE_SOURCE_DIRECTORY \"{{.G_CORE_SQLITE3_SRC_DIR}}\"
        )" >> "{{.G_CORE_DEPS_CMAKE_SETTINGS_DIR}}/SQLITE3.cmake"

  utfcpp:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_UTFCPP_CHECKSUM_FILE}}"
      DEST: "{{.G_CORE_COMPONENT_SUBMODULES_DIR}}/utfcpp"
    sources:
      - "{{.G_DEP_DOWNLOAD_SCRIPT}}"
      - "{{.G_UTILS_TASKFILE}}"
      - "{{.ROOT_DIR}}/Taskfile.yml"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    deps:
      - ":init"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]
    cmds:
      - task: "download-dependency"
        vars:
          DEST: "{{.DEST}}"
          FLAGS: "--extract"
          SRC_NAME: "utfcpp-4.0.6"
          SRC_URL: "https://github.com/nemtrif/utfcpp/archive/refs/tags/v4.0.6.zip"
      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]

  yaml-cpp:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_YAML_CPP_CHECKSUM_FILE}}"
      DEST: "{{.G_CORE_COMPONENT_SUBMODULES_DIR}}/yaml-cpp"
    sources:
      - "{{.G_DEP_DOWNLOAD_SCRIPT}}"
      - "{{.G_UTILS_TASKFILE}}"
      - "{{.ROOT_DIR}}/Taskfile.yml"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    deps:
      - ":init"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]
    cmds:
      - task: "download-dependency"
        vars:
          DEST: "{{.DEST}}"
          FLAGS: "--extract"
          SRC_NAME: "yaml-cpp-yaml-cpp-0.7.0"
          SRC_URL: "https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.7.0.zip"
      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]

  ystdlib-cpp:
    internal: true
    vars:
      CHECKSUM_FILE: "{{.G_YSTDLIB_CPP_CHECKSUM_FILE}}"
      DEST: "{{.G_CORE_COMPONENT_SUBMODULES_DIR}}/ystdlib-cpp"
    sources:
      - "{{.G_DEP_DOWNLOAD_SCRIPT}}"
      - "{{.G_UTILS_TASKFILE}}"
      - "{{.ROOT_DIR}}/Taskfile.yml"
      - "{{.TASKFILE}}"
    generates: ["{{.CHECKSUM_FILE}}"]
    deps:
      - ":init"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]
    cmds:
      - task: "download-dependency"
        vars:
          DEST: "{{.DEST}}"
          FLAGS: "--extract"
          SRC_NAME: "ystdlib-cpp-d1b4ae0"
          SRC_URL: "https://github.com/y-scope/ystdlib-cpp/archive/d1b4ae0.zip"
      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.DEST}}"]


  download-dependency:
    internal: true
    label: "{{.TASK}}-{{.SRC_NAME}}"
    requires:
      vars: ["DEST", "FLAGS", "SRC_NAME", "SRC_URL"]
    deps:
      - ":init"
    cmds:
      - >-
        python3 "{{.G_DEP_DOWNLOAD_SCRIPT}}"
        "{{.SRC_URL}}"
        {{.SRC_NAME}}
        "{{.DEST}}"
        {{.FLAGS}}
